# techpdfparser configuration
# Copy this file to config.yaml and adjust values for your setup.
# Tool switching is config-driven: change adapter names here, then run
# `python -m src doctor --config config.yaml` before ingest.

storage:
  base_dir: "outputs"

pipelines:
  visual:
    renderer: "pymupdf"
    # "colqwen25" is multi-vector; "clip" is a simpler CPU/AMD fallback.
    embedder: "colqwen25"
    # Base collection name. A namespace may be prefixed automatically.
    collection: "visual_pages"
    dpi: 150

  text:
    # "section_aware" requires "pymupdf_structured".
    extractor: "olmocr2"
    chunker: "fixed_size"
    embedder: "bge_m3"
    # Base collection name. A namespace may be prefixed automatically.
    collection: "text_chunks"
    chunk_size: 512
    chunk_overlap: 64

  structured:
    parser: "mineru25"
    formula_extractor: "ppformulanet"
    figure_descriptor: "qwen25vl"
    collections:
      # Base collection names. A namespace may be prefixed automatically.
      tables: "tables"
      formulas: "formulas"
      figures: "figures"

retrieval:
  # Productive backend: "qdrant"
  # Test-only backend for local verification: "memory"
  retrieval_engine: "qdrant"
  fusion_engine: "rrf"
  # "auto"  -> backend + embedder signatures determine the namespace
  # "legacy" -> old collection names without namespace prefix
  # any other string -> explicit stable namespace
  index_namespace: "auto"
  validate_on_start: true
  fail_on_schema_mismatch: true

adapters:
  pymupdf:
    dpi: 150

  colqwen25:
    model_name: "vidore/colqwen2.5-v0.2"
    device: "cuda"
    batch_size: 4

  clip:
    model_name: "openai/clip-vit-base-patch32"
    device: "cpu"

  olmocr2:
    model_name: "allenai/olmOCR-2"
    device: "cuda"

  pymupdf_text: {}

  pymupdf_structured:
    heading_size_ratio: 1.3
    max_heading_levels: 4

  section_aware:
    # Merges adjacent blocks with the same section_path on the same page
    # until chunk_size would be exceeded.
    chunk_size: 512
    chunk_overlap: 64

  bge_m3:
    model_name: "BAAI/bge-m3"
    device: "cuda"
    batch_size: 32

  minilm:
    model_name: "all-MiniLM-L6-v2"
    device: "cpu"
    batch_size: 64

  mineru25:
    model_path: ""
    device: "cuda"

  pdfplumber: {}

  ppformulanet:
    model_path: ""
    device: "cuda"

  pix2tex:
    device: "cpu"

  qwen25vl:
    model_name: "Qwen/Qwen2.5-VL-7B-Instruct"
    device: "cuda"

  moondream:
    model_name: "vikhyatk/moondream2"
    revision: "2025-01-09"
    device: "cpu"

  qdrant:
    host: "localhost"
    port: 6333
    collection_prefix: ""

  memory:
    # Test-only backend used by the core tests and `doctor`.
    store_name: "default"
    collection_prefix: ""
