# techpdfparser configuration
# Copy this file to config.yaml and adjust values for your setup.
# Tool switching is config-driven: change an adapter name here to swap the tool.

storage:
  # All pipeline outputs (rendered images, raw OCR, etc.) go here.
  base_dir: "outputs"

pipelines:
  visual:
    # Swap renderer: "pymupdf" | "pdf2image" | "pypdfium2"
    renderer: "pymupdf"
    # Swap embedder: "colqwen25" | "colpali" | "clip"
    # AMD/CPU alternative: "clip"  (512-dim, single-vector, no CUDA required)
    embedder: "colqwen25"
    collection: "visual_pages"
    dpi: 150

  text:
    # Swap extractor: "olmocr2" | "pymupdf_text" | "pymupdf_structured" | "docling_text"
    # AMD/CPU alternative: "pymupdf_structured"  (font-aware, section detection, no CUDA)
    extractor: "olmocr2"
    # Swap chunker: "fixed_size" | "section_aware"
    # "section_aware" never splits across headings; requires pymupdf_structured extractor
    chunker: "fixed_size"
    # Swap embedder: "bge_m3" | "e5_large" | "gte_qwen2" | "minilm"
    # AMD/CPU alternative: "minilm"  (384-dim, CPU-native via sentence-transformers)
    embedder: "bge_m3"
    collection: "text_chunks"
    chunk_size: 512
    chunk_overlap: 64

  structured:
    # Swap parser: "mineru25" | "docling" | "unstructured" | "pdfplumber"
    # AMD/CPU alternative: "pdfplumber"  (tables + figures only, no formula ML, no CUDA)
    parser: "mineru25"
    # Swap formula extractor: "ppformulanet" | "pix2tex" | "unimernet"
    # AMD/CPU alternative: "pix2tex"  (CPU ViT ~400MB, LaTeX output)
    formula_extractor: "ppformulanet"
    # Swap figure descriptor: "qwen25vl" | "llava" | "internvl" | "moondream"
    # AMD/CPU alternative: "moondream"  (~2B params, CPU-viable for testing)
    figure_descriptor: "qwen25vl"
    collections:
      tables: "tables"
      formulas: "formulas"
      figures: "figures"

# Per-adapter settings. Keys match adapter names above.
adapters:
  pymupdf:
    dpi: 150

  colqwen25:
    model_name: "vidore/colqwen2.5-v0.2"
    device: "cuda"
    batch_size: 4

  olmocr2:
    model_name: "allenai/olmOCR-2"
    device: "cuda"

  mineru25:
    model_path: ""    # leave empty to use default HuggingFace download
    device: "cuda"

  ppformulanet:
    model_path: ""
    device: "cuda"

  qwen25vl:
    model_name: "Qwen/Qwen2.5-VL-7B-Instruct"
    device: "cuda"

  bge_m3:
    model_name: "BAAI/bge-m3"
    device: "cuda"
    batch_size: 32

  qdrant:
    host: "localhost"
    port: 6333
    collection_prefix: ""   # set to "dev_" to namespace collections in shared DB

  # AMD / CPU-fallback adapters
  clip:
    model_name: "openai/clip-vit-base-patch32"
    device: "cpu"           # set to "directml" if torch-directml is installed

  pymupdf_text: {}          # no configurable parameters

  pymupdf_structured:
    heading_size_ratio: 1.3   # spans >= ratio * median font size are treated as headings
    max_heading_levels: 4     # maximum number of distinct heading levels to detect

  section_aware:
    chunk_size: 512
    chunk_overlap: 64

  minilm:
    model_name: "all-MiniLM-L6-v2"
    device: "cpu"
    batch_size: 64

  pdfplumber: {}            # no configurable parameters

  pix2tex:
    device: "cpu"

  moondream:
    model_name: "vikhyatk/moondream2"
    revision: "2025-01-09"
    device: "cpu"
